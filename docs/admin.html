<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Funding Request - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #232f3e 0%, #37475a 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #FF9900 0%, #FF7300 100%);
            color: white;
            padding: 30px;
            border-radius: 8px 8px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: #232f3e;
            color: white;
        }

        .btn-primary:hover {
            background: #3a4d5e;
        }

        .btn-secondary {
            background: white;
            color: #FF9900;
        }

        .btn-secondary:hover {
            background: #f0f0f0;
        }

        .btn-danger {
            background: #d32f2f;
            color: white;
        }

        .btn-danger:hover {
            background: #b71c1c;
        }

        .controls {
            background: white;
            padding: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #FF9900;
            box-shadow: 0 0 0 3px rgba(255, 153, 0, 0.1);
        }

        .stats {
            background: white;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            border-bottom: 1px solid #ddd;
        }

        .stat-card {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 4px;
            border-left: 4px solid #FF9900;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            font-weight: 600;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #232f3e;
            margin-top: 5px;
        }

        .content {
            background: white;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f5f5f5;
            border-bottom: 2px solid #ddd;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #232f3e;
            font-size: 14px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        tbody tr:hover {
            background: #f9f9f9;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-new {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status-review {
            background: #fff3e0;
            color: #f57c00;
        }

        .status-approved {
            background: #e8f5e9;
            color: #388e3c;
        }

        .arr-value {
            font-weight: 600;
            color: #FF9900;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-view {
            background: #2196F3;
            color: white;
        }

        .btn-view:hover {
            background: #1976D2;
        }

        .btn-delete {
            background: #f44336;
            color: white;
        }

        .btn-delete:hover {
            background: #d32f2f;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .empty-state-text {
            font-size: 16px;
            margin-bottom: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            background: linear-gradient(135deg, #FF9900 0%, #FF7300 100%);
            color: white;
            padding: 20px;
            border-radius: 8px 8px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 20px;
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .modal-body {
            padding: 20px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .detail-group {
            margin-bottom: 25px;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .detail-group:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: 600;
            color: #232f3e;
            margin-bottom: 5px;
            font-size: 13px;
            text-transform: uppercase;
            color: #666;
        }

        .detail-value {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
        }

        .service-tag {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 4px 8px;
            border-radius: 4px;
            margin: 3px;
            font-size: 12px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #FF9900;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .header-actions {
                width: 100%;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                min-width: unset;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 10px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn-small {
                width: 100%;
            }

            .modal-content {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Funding Requests Dashboard</h1>
            <div class="header-actions">
                <a href="/" class="btn btn-secondary">← Back to Form</a>
                <button class="btn btn-primary" onclick="location.reload()">🔄 Refresh</button>
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-label">Total Requests</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total ARR</div>
                <div class="stat-value" id="totalArr">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Project ARR</div>
                <div class="stat-value" id="avgArr">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Users</div>
                <div class="stat-value" id="totalUsers">0</div>
            </div>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by project name, customer, or submitter...">
            </div>
        </div>

        <div class="content">
            <div id="loadingState" class="loading">
                <div class="spinner"></div>
                Loading requests...
            </div>

            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-state-icon">📋</div>
                <div class="empty-state-text">No funding requests submitted yet</div>
                <a href="/" class="btn btn-primary">Go to Form</a>
            </div>

            <div class="table-wrapper" id="tableWrapper" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th>Project Name</th>
                            <th>Customer</th>
                            <th>Submitter</th>
                            <th>Est. AWS ARR</th>
                            <th>Users</th>
                            <th>Timeline</th>
                            <th>Date Submitted</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Request Details</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Details will be populated here -->
            </div>
        </div>
    </div>

    <script>
        let allResponses = [];

        // IndexedDB setup
        const DB_NAME = 'AWFFundingRequests';
        const DB_VERSION = 1;
        const STORE_NAME = 'submissions';

        function initIndexedDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);

                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
            });
        }

        async function getAllResponses() {
            const db = await initIndexedDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();

                request.onerror = () => reject(request.error);
                request.onsuccess = async () => {
                    let responses = request.result || [];
                    const now = new Date();

                    // Filter out expired submissions and delete them
                    const activeResponses = [];
                    for (const response of responses) {
                        if (response.expiresAt && new Date(response.expiresAt) < now) {
                            await deleteResponse(response.id);
                        } else {
                            activeResponses.push(response);
                        }
                    }

                    resolve(activeResponses);
                };
            });
        }

        async function deleteResponse(id) {
            const db = await initIndexedDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.delete(id);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(true);
            });
        }

        // Fetch all responses on load
        async function loadResponses() {
            try {
                allResponses = await getAllResponses();
                allResponses = allResponses.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                if (allResponses.length === 0) {
                    showEmpty();
                } else {
                    renderTable(allResponses);
                    updateStats();
                }
            } catch (error) {
                console.error('Error loading responses:', error);
                showEmpty();
            }
        }

        function updateStats() {
            const totalCount = allResponses.length;
            const totalArr = allResponses.reduce((sum, r) => sum + (parseInt(r.revenue) || 0), 0);
            const avgArr = totalCount > 0 ? totalArr / totalCount : 0;
            const totalUsers = allResponses.reduce((sum, r) => {
                const userRange = r.userCount || '0';
                const match = userRange.match(/(\d+)/);
                return sum + (match ? parseInt(match[1]) : 0);
            }, 0);

            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('totalArr').textContent = '$' + formatNumber(totalArr);
            document.getElementById('avgArr').textContent = '$' + formatNumber(Math.round(avgArr));
            document.getElementById('totalUsers').textContent = formatNumber(totalUsers);
        }

        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }

        function formatCurrency(amount, currency = 'USD') {
            const symbols = {
                'USD': '$',
                'EUR': '€',
                'GBP': '£',
                'JPY': '¥',
                'INR': '₹',
                'CAD': 'C$',
                'AUD': 'A$'
            };
            return (symbols[currency] || '$') + parseInt(amount).toLocaleString();
        }

        function formatDate(isoDate) {
            const date = new Date(isoDate);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function renderTable(data) {
            const tableBody = document.getElementById('tableBody');
            const tableWrapper = document.getElementById('tableWrapper');
            const loadingState = document.getElementById('loadingState');

            tableBody.innerHTML = '';

            if (data.length === 0) {
                showEmpty();
                return;
            }

            data.forEach(response => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${response.projectName}</strong></td>
                    <td>${response.customerName}</td>
                    <td>${response.submitterName}</td>
                    <td class="arr-value">${formatCurrency(response.revenue, response.currency)}</td>
                    <td>${response.userCount}</td>
                    <td>${formatTimeline(response.projectTimeline)}</td>
                    <td>${formatDate(response.timestamp)}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn-small btn-view" onclick="viewDetail('${response.id}')">View</button>
                            <button class="btn-small btn-delete" onclick="deleteResponseAction('${response.id}')">Delete</button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(row);
            });

            loadingState.style.display = 'none';
            tableWrapper.style.display = 'block';
        }

        function formatTimeline(timeline) {
            const timelines = {
                '0-3-months': '0-3 mo',
                '3-6-months': '3-6 mo',
                '6-12-months': '6-12 mo',
                '12plus-months': '12+ mo'
            };
            return timelines[timeline] || timeline;
        }

        function showEmpty() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('emptyState').style.display = 'block';
            document.getElementById('tableWrapper').style.display = 'none';
        }

        async function viewDetail(id) {
            try {
                const response = await fetch(`/api/responses/${id}`);
                const result = await response.json();

                if (result.success) {
                    const data = result.data;
                    const modal = document.getElementById('detailModal');
                    const modalBody = document.getElementById('modalBody');

                    modalBody.innerHTML = `
                        <div class="detail-group">
                            <div class="detail-label">Project Details</div>
                            <div class="detail-value">
                                <strong>${data.projectName}</strong><br>
                                Customer: ${data.customerName}<br>
                                Geography: ${data.geography}<br>
                                Start Date: ${new Date(data.projectStartDate).toLocaleDateString()}
                            </div>
                        </div>

                        <div class="detail-group">
                            <div class="detail-label">Description</div>
                            <div class="detail-value">${escapeHtml(data.projectDescription)}</div>
                        </div>

                        <div class="detail-group">
                            <div class="detail-label">Scale & Infrastructure</div>
                            <div class="detail-value">
                                Environments: ${data.numEnvironments}<br>
                                Users: ${data.userCount}<br>
                                Data Volume: ${data.dataVolumeGb}
                            </div>
                        </div>

                        <div class="detail-group">
                            <div class="detail-label">Opportunity Context</div>
                            <div class="detail-value">${escapeHtml(data.opportunityContext)}</div>
                        </div>

                        <div class="detail-group">
                            <div class="detail-label">Financial Details</div>
                            <div class="detail-value">
                                <strong class="arr-value">${formatCurrency(data.revenue, data.currency)}</strong><br>
                                Timeline: ${formatTimeline(data.projectTimeline)}<br>
                                Deal Stage: ${data.dealStage}
                            </div>
                        </div>

                        <div class="detail-group">
                            <div class="detail-label">AWS Services (${data.awsServices.length})</div>
                            <div class="detail-value">
                                ${data.awsServices.map(s => `<span class="service-tag">${s}</span>`).join('')}
                                ${data.additionalServices ? `<br><br><strong>Additional Details:</strong><br>${escapeHtml(data.additionalServices)}` : ''}
                            </div>
                        </div>

                        ${data.repAware === 'yes' ? `
                        <div class="detail-group">
                            <div class="detail-label">AWS Account Rep</div>
                            <div class="detail-value">
                                Name: ${data.repName || 'N/A'}<br>
                                Email: ${data.repEmail || 'N/A'}
                            </div>
                        </div>
                        ` : `
                        <div class="detail-group">
                            <div class="detail-label">AWS Account Rep</div>
                            <div class="detail-value">Not aware of this opportunity</div>
                        </div>
                        `}

                        ${data.repContext ? `
                        <div class="detail-group">
                            <div class="detail-label">Rep Context</div>
                            <div class="detail-value">${escapeHtml(data.repContext)}</div>
                        </div>
                        ` : ''}

                        <div class="detail-group">
                            <div class="detail-label">Submitter Information</div>
                            <div class="detail-value">
                                Name: ${data.submitterName}<br>
                                Email: ${data.submitterEmail}<br>
                                Role: ${data.submitterRole}<br>
                                Phone: ${data.submitterPhone || 'N/A'}
                            </div>
                        </div>

                        ${data.additionalNotes ? `
                        <div class="detail-group">
                            <div class="detail-label">Additional Notes</div>
                            <div class="detail-value">${escapeHtml(data.additionalNotes)}</div>
                        </div>
                        ` : ''}

                        <div class="detail-group">
                            <div class="detail-label">Submission Date</div>
                            <div class="detail-value">${formatDate(data.timestamp)}</div>
                        </div>
                    `;

                    modal.classList.add('active');
                }
            } catch (error) {
                alert('Error loading details: ' + error.message);
            }
        }

        async function deleteResponseAction(id) {
            if (!confirm('Are you sure you want to delete this request?')) {
                return;
            }

            try {
                await deleteResponse(id);
                allResponses = allResponses.filter(r => r.id !== id);
                renderTable(allResponses);
                updateStats();
                alert('Request deleted successfully');
            } catch (error) {
                alert('Error deleting request: ' + error.message);
            }
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            const filtered = allResponses.filter(r =>
                r.projectName.toLowerCase().includes(query) ||
                r.customerName.toLowerCase().includes(query) ||
                r.submitterName.toLowerCase().includes(query)
            );
            renderTable(filtered);
        });

        // Close modal when clicking outside
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Load data on page load
        loadResponses();
    </script>
</body>
</html>
